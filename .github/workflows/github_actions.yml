name: Tender Sniper - Auto Scrape & Broadcast

permissions:
  contents: write

on:
  schedule:
    # Run every 2 hours
    - cron: '0 */2 * * *'
  workflow_dispatch:  # Manual trigger

# POLISI LALU LINTAS: Mencegah tabrakan jika kamu klik manual berkali-kali
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  scrape-and-broadcast:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install requests beautifulsoup4 python-telegram-bot

    - name: Run Scraper
      run: python tender_sniper_scraper.py

    - name: Run Bot Broadcast
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: python tender_sniper_broadcast.py

    - name: Auto Commit and Push Results
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Update tenders data"
        file_pattern: "tenders_jatim.json"
        commit_user_name: GitHub Action
        commit_user_email: action@github.com
